<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Position Marker Preview</title>
<style>
  body { background: #1a1a1a; color: #ccc; font-family: monospace; padding: 32px; display: flex; flex-direction: column; gap: 32px; }
  h2 { margin: 0 0 8px; font-size: 14px; color: #888; font-weight: normal; }
  .row { display: flex; gap: 48px; align-items: flex-start; }
  canvas { image-rendering: pixelated; display: block; }
  p { margin: 4px 0; font-size: 12px; color: #666; }
</style>
</head>
<body>

<div class="row">
  <div>
    <h2>Actual size (on minimap)</h2>
    <canvas id="actual" width="144" height="144"></canvas>
    <p>144×144 px minimap, marker = 8px diameter</p>
  </div>

  <div>
    <h2>20× zoom — raw greyscale</h2>
    <canvas id="zoom-grey" width="180" height="180"></canvas>
    <p>9×9 px area magnified 20×</p>
  </div>

  <div>
    <h2>20× zoom — on G2 (phosphor green)</h2>
    <canvas id="zoom-green" width="180" height="180"></canvas>
    <p>After sepia + hue-rotate + saturate filter</p>
  </div>
</div>

<script>
// ── Draw actual-size minimap ──────────────────────────────────────────────────
const actual = document.getElementById('actual')
const actCtx = actual.getContext('2d')
const W = 144, H = 144, cx = W/2, cy = H/2

// Dark background
actCtx.fillStyle = '#111'
actCtx.fillRect(0, 0, W, H)

// Some fake roads for context
actCtx.strokeStyle = '#555'
actCtx.lineWidth = 2
actCtx.beginPath(); actCtx.moveTo(0, cy); actCtx.lineTo(W, cy); actCtx.stroke()
actCtx.beginPath(); actCtx.moveTo(cx, 0); actCtx.lineTo(cx, H); actCtx.stroke()
actCtx.beginPath(); actCtx.moveTo(0, 18); actCtx.lineTo(cx, cy); actCtx.stroke()

// Route highlight
actCtx.strokeStyle = '#fff'
actCtx.lineWidth = 2
actCtx.beginPath(); actCtx.moveTo(cx, cy); actCtx.lineTo(W, 30); actCtx.stroke()

// ── The marker (exact code from mapDraw.ts) ───────────────────────────────────
actCtx.fillStyle = '#000'
actCtx.beginPath()
actCtx.arc(cx, cy, 4, 0, Math.PI * 2)
actCtx.fill()
actCtx.fillStyle = '#fff'
actCtx.beginPath()
actCtx.arc(cx, cy, 3, 0, Math.PI * 2)
actCtx.fill()

// ── Zoom: grab 9×9 area around marker ────────────────────────────────────────
const ZOOM = 20
const HALF = 4  // pixels either side of centre to capture

// Grey zoom
const greyCanvas = document.getElementById('zoom-grey')
const greyCtx = greyCanvas.getContext('2d')
greyCtx.imageSmoothingEnabled = false
greyCtx.drawImage(actual,
  cx - HALF, cy - HALF, HALF*2+1, HALF*2+1,  // source
  0, 0, (HALF*2+1)*ZOOM, (HALF*2+1)*ZOOM       // dest
)

// Green zoom — draw marker with green tint for G2 appearance
const greenCanvas = document.getElementById('zoom-green')
const greenCtx = greenCanvas.getContext('2d')

const tmp = new OffscreenCanvas(HALF*2+1, HALF*2+1)
const tmpCtx = tmp.getContext('2d')
tmpCtx.drawImage(actual, cx - HALF, cy - HALF, HALF*2+1, HALF*2+1, 0, 0, HALF*2+1, HALF*2+1)

greenCtx.filter = 'sepia(1) hue-rotate(82deg) saturate(5) brightness(0.95)'
greenCtx.imageSmoothingEnabled = false
greenCtx.drawImage(tmp, 0, 0, HALF*2+1, HALF*2+1, 0, 0, (HALF*2+1)*ZOOM, (HALF*2+1)*ZOOM)
</script>
</body>
</html>
